# ============================================================
# Docker Compose - Local Development
# Mirrors the production AWS architecture in containers:
#   - nginx      = ALB + Nginx on EC2
#   - drupal-fpm = PHP-FPM on EC2
#   - mysql      = RDS MySQL
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down -v   # also removes volumes
# ============================================================

services:

  mysql:
    image: mysql:8.0
    container_name: drupal-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: drupal_db
      MYSQL_USER: drupal_admin
      MYSQL_PASSWORD: drupal_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - drupal-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  drupal-fpm:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: drupal-fpm
    restart: unless-stopped
    environment:
      DRUPAL_DB_HOST: mysql
      DRUPAL_DB_PORT: 3306
      DRUPAL_DB_NAME: drupal_db
      DRUPAL_DB_USER: drupal_admin
      DRUPAL_DB_PASS: drupal_password
    volumes:
      # Only the files directory is mounted - user uploads persist
      # settings.php lives inside the container, written by Drush
      - drupal_files:/var/www/html/web/sites/default/files
    networks:
      - drupal-network
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: drupal-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/drupal.conf:/etc/nginx/conf.d/default.conf:ro
      - drupal_files:/var/www/html/web/sites/default/files:ro
    networks:
      - drupal-network
    depends_on:
      - drupal-fpm

volumes:
  mysql_data:
    driver: local
  drupal_files:
    driver: local

networks:
  drupal-network:
    driver: bridge
