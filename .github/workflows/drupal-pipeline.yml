# ============================================================
# Drupal CI/CD Pipeline
# Runs on every push to main and pull requests.
# Flow: build -> test -> staging deploy -> smoke test -> prod deploy
# Uses OIDC so no AWS keys are stored in GitHub secrets.
# ============================================================

name: Drupal CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: drupal-app
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: read

jobs:

  # ============================================================
  # Job 1: Build and push Docker image to ECR
  # ============================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR repository if it does not exist
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"

          docker build \
            -t "$IMAGE_URI" \
            -t "$REGISTRY/${{ env.ECR_REPOSITORY }}:latest" \
            ./docker/

          docker push "$IMAGE_URI"
          docker push "$REGISTRY/${{ env.ECR_REPOSITORY }}:latest"

          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "Built and pushed: $IMAGE_URI"

  # ============================================================
  # Job 2: Run automated tests against the built image
  # ============================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull the built image
        run: |
          docker pull ${{ needs.build.outputs.image_uri }}

      - name: Run PHP syntax check
        run: |
          docker run --rm \
            ${{ needs.build.outputs.image_uri }} \
            php -l web/index.php

      - name: Check Drupal core files are present
        run: |
          docker run --rm \
            ${{ needs.build.outputs.image_uri }} \
            test -f web/index.php && echo "web/index.php exists"

          docker run --rm \
            ${{ needs.build.outputs.image_uri }} \
            test -f vendor/bin/drush && echo "Drush exists"

      - name: Check PHP extensions required by Drupal
        run: |
          docker run --rm \
            ${{ needs.build.outputs.image_uri }} \
            php -m | grep -E "gd|pdo_mysql|mbstring|intl|opcache|zip"

      - name: Start stack and run integration test
        run: |
          docker compose up -d

          # Wait for MySQL to be ready
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do
            if docker compose exec -T mysql mysqladmin ping -h localhost -u root -prootpassword 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            sleep 5
          done

          # Install Drupal
          docker compose exec -T drupal-fpm vendor/bin/drush site:install standard \
            --db-url=mysql://drupal_admin:drupal_password@mysql:3306/drupal_db \
            --site-name="Test Site" \
            --account-name=admin \
            --account-pass=admin123 \
            --account-mail=admin@example.com \
            --yes

          # Test the health endpoint
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Health check passed: $HTTP_STATUS"
          else            echo "Health check failed: $HTTP_STATUS"
            docker compose logs
            exit 1
          fi

          # Test the Drupal homepage returns 200
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Drupal homepage passed: $HTTP_STATUS"
          else            echo "Drupal homepage failed: $HTTP_STATUS"
            exit 1
          fi

          docker compose down -v

  # ============================================================
  # Job 3: Deploy to staging (first EC2 instance only)
  # Only runs on push to main, not on pull requests
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: staging
      url: http://${{ env.ALB_URL }}

    env:
      ALB_URL: ${{ secrets.ALB_DNS_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip
          sudo pip3 install ansible boto3 botocore --break-system-packages
          ansible-galaxy collection install amazon.aws community.aws community.general

      - name: Install AWS Session Manager plugin
        run: |
          curl -s "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o session-manager-plugin.deb
          sudo dpkg -i session-manager-plugin.deb

      - name: Get staging instance (first instance alphabetically)
        id: staging
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=drupal-aws-production-app" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text | tr '\t' '\n' | sort | head -1)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Staging instance: $INSTANCE_ID"

      - name: Deploy to staging instance via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ steps.staging.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              'cd /var/www/html/drupal',
              'sudo -u www-data composer install --no-interaction --prefer-dist',
              'sudo -u www-data vendor/bin/drush updatedb --yes',
              'sudo -u www-data vendor/bin/drush cache:rebuild',
              'sudo systemctl reload nginx'
            ]" \
            --comment "Staging deploy from GitHub Actions - ${{ github.sha }}" \
            --output text \
            --query "Command.CommandId" > /tmp/command_id.txt

          COMMAND_ID=$(cat /tmp/command_id.txt)
          echo "Command ID: $COMMAND_ID"

          # Wait for the command to complete
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ steps.staging.outputs.instance_id }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            
            echo "Current Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deployment succeeded!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 10
          done

  # ============================================================
  # Job 4: Deploy to Production
  # Pauses for manual review and approval in GitHub UI
  # ============================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: http://${{ env.ALB_URL }}

    env:
      ALB_URL: ${{ secrets.ALB_DNS_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS Session Manager plugin
        run: |
          curl -s "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o session-manager-plugin.deb
          sudo dpkg -i session-manager-plugin.deb

      - name: Get all production instances
        id: production_nodes
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=drupal-aws-production-app" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text | tr '\t' ',')
          echo "ids=$INSTANCE_IDS" >> $GITHUB_OUTPUT
          echo "Target Production Nodes: $INSTANCE_IDS"

      - name: Deploy to all production app servers via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ steps.production_nodes.outputs.ids }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              'cd /var/www/html/drupal',
              'sudo -u www-data composer install --no-interaction --prefer-dist',
              'sudo -u www-data vendor/bin/drush updatedb --yes',
              'sudo -u www-data vendor/bin/drush cache:rebuild',
              'sudo systemctl reload nginx'
            ]" \
            --comment "Production release from GitHub Actions - ${{ github.sha }}" \
            --output text \
            --query "Command.CommandId" > /tmp/prod_command_id.txt

          COMMAND_ID=$(cat /tmp/prod_command_id.txt)
          echo "Production Command ID: $COMMAND_ID"

          # Target array validation check loops
          FIRST_NODE=$(echo "${{ steps.production_nodes.outputs.ids }}" | cut -d',' -f1)
          
          for i in $(seq 1 45); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$FIRST_NODE" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            
            echo "Production Deployment Status tracking node $FIRST_NODE: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Production deployment executed cleanly!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Production deployment runtime error encountered: $STATUS"
              exit 1
            fi
            sleep 10
          done