apiVersion: v1
kind: Secret
metadata:
  name: drupal-secret
  namespace: drupal
type: Opaque
# Values are base64 encoded
# echo -n "drupal_password" | base64  ->  ZHJ1cGFsX3Bhc3N3b3Jk
# echo -n "rootpassword" | base64     ->  cm9vdHBhc3N3b3Jk
data:
  DRUPAL_DB_PASS: ZHJ1cGFsX3Bhc3N3b3Jk
  MYSQL_ROOT_PASSWORD: cm9vdHBhc3N3b3Jk
  MYSQL_PASSWORD: ZHJ1cGFsX3Bhc3N3b3Jk
