# ============================================================
# Nginx config for Drupal in Docker
# Nginx runs as its own container and proxies PHP requests
# to the drupal-fpm container on port 9000 via Docker network
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/html/web;
    index index.php index.html;

    # Health check endpoint - same as on EC2
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "OK\n";
    }

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # In Docker, PHP-FPM runs as a separate container
        # We reach it via the service name on port 9000
        fastcgi_pass drupal-fpm:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 120;
    }

    location ~ ^/sites/.*/private/ { deny all; }
    location ~ (^|/)\. { deny all; }
    location ~ ^/sites/[^/]+/settings.*\.php$ { deny all; }

    location ~* \.(js|css|gif|jpg|jpeg|png|svg|woff|woff2|ttf|ico)$ {
        try_files $uri @rewrite;
        expires 30d;
        access_log off;
    }

    location @rewrite {
        rewrite ^ /index.php;
    }

    client_max_body_size 64M;

    access_log /var/log/nginx/drupal-access.log;
    error_log /var/log/nginx/drupal-error.log;
}
