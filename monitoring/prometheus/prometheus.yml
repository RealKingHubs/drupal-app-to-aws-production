# ============================================================
# Prometheus Configuration
# Scrapes metrics from EC2 instances remotely via node exporter
# Node exporter runs on port 9100, installed by Terraform userdata
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: drupal-aws
    environment: production

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node_exporter
    static_configs:
      - targets:
          - 10.0.11.230:9100
          - 10.0.12.28:9100
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+):.*"
        replacement: "${1}"

  - job_name: nginx
    static_configs:
      - targets:
          - 10.0.11.230:9113
          - 10.0.12.28:9113
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+):.*"
        replacement: "${1}"