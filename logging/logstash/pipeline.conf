input {
  beats {
    port => 5044
  }
}

filter {
  if [fields][log_type] == "nginx_access" {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - %{DATA:user} \[%{HTTPDATE:timestamp}\] "%{WORD:method} %{DATA:request} HTTP/%{NUMBER:http_version}" %{NUMBER:response_code:int} %{NUMBER:bytes:int} "%{DATA:referrer}" "%{DATA:user_agent}"'
      }
    }
    date {
      match => [ "timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ]
      target => "@timestamp"
      remove_field => [ "timestamp" ]
    }
  } else if [fields][log_type] == "drupal_error" {
    grok {
      match => {
        "message" => '%{TIMESTAMP_ISO8601:timestamp}\|%{DATA:severity}\|%{DATA:channel}\|%{DATA:client_ip}\|%{DATA:request_url}\|%{DATA:referrer}\|%{DATA:uid}\|%{GREEDYDATA:error_message}'
      }
    }
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
      remove_field => [ "timestamp" ]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "drupal-logs-%{+YYYY.MM.dd}"
  }
}
